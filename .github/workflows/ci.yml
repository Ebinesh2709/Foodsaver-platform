name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit tests/ --testdox

  deploy-check:
    name: Critical File Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify all critical files exist
        run: |
          test -f config/db.php             || (echo "MISSING: config/db.php" && exit 1)
          test -f includes/ai_helper.php    || (echo "MISSING: includes/ai_helper.php" && exit 1)
          test -f includes/csrf_helper.php  || (echo "MISSING: includes/csrf_helper.php" && exit 1)
          test -f includes/header.php       || (echo "MISSING: includes/header.php" && exit 1)
          test -f includes/footer.php       || (echo "MISSING: includes/footer.php" && exit 1)
          test -f auth/login.php            || (echo "MISSING: auth/login.php" && exit 1)
          test -f auth/register.php         || (echo "MISSING: auth/register.php" && exit 1)
          test -f business/dashboard.php    || (echo "MISSING: business/dashboard.php" && exit 1)
          test -f business/add_listing.php  || (echo "MISSING: business/add_listing.php" && exit 1)
          test -f business/my_listings.php  || (echo "MISSING: business/my_listings.php" && exit 1)
          test -f browse_listings.php       || (echo "MISSING: browse_listings.php" && exit 1)
          test -f reserve_listing.php       || (echo "MISSING: reserve_listing.php" && exit 1)
          test -f my_reservations.php       || (echo "MISSING: my_reservations.php" && exit 1)
          echo "All critical files present ✓"
